<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Commission">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Commission Calculator</title>
<style>
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1c1c1a;
    --text-secondary: #6b6a64;
    --accent: #1d9e75;
    --border: rgba(0,0,0,0.08);
    --success-bg: #eaf3de;
    --success-text: #27500a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --card: #2c2c2a;
      --text: #f1efe8;
      --text-secondary: #b4b2a9;
      --border: rgba(255,255,255,0.1);
      --success-bg: #173404;
      --success-text: #c0dd97;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; padding-top: 24px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 20px; text-align: center; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type="number"] {
    flex: 1;
    font-size: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  input[type="number"]:focus { outline: 2px solid var(--accent); }
  button {
    font-size: 17px;
    font-weight: 600;
    padding: 14px 22px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
  .secondary-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    width: 100%;
    margin-top: 8px;
    font-weight: 500;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 6px; }
  .card-value { font-size: 20px; font-weight: 600; margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid .card-value { font-size: 22px; }
  .min-msg {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    background: var(--success-bg);
    color: var(--success-text);
    padding: 6px 10px;
    border-radius: 8px;
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Commission Calculator</h1>

  <div class="input-row">
    <input type="number" id="jobAmount" placeholder="Job amount ($)" inputmode="decimal">
    <button id="addBtn">Add</button>
  </div>

  <div class="card">
    <p class="card-label">Last job</p>
    <p class="card-value" id="lastJob">—</p>
  </div>

  <div class="grid">
    <div class="card">
      <p class="card-label">Actual commission earned</p>
      <p class="card-value" id="total">$0.00</p>
    </div>
    <div class="card">
      <p class="card-label">Work total</p>
      <p class="card-value" id="workTotal">$0.00</p>
      <p class="min-msg" id="minMsg">Minimum work amount reached</p>
    </div>
  </div>

  <button class="secondary-btn" id="resetBtn">Reset day</button>
</div>

<script>
const RATE = 0.38;
const MIN_WORK = 300;
const STORAGE_KEY = 'commissionAppState';

let state = { total: 0, workTotal: 0, lastJob: null };

const input = document.getElementById('jobAmount');
const lastJobEl = document.getElementById('lastJob');
const totalEl = document.getElementById('total');
const workTotalEl = document.getElementById('workTotal');
const minMsg = document.getElementById('minMsg');

function render() {
  totalEl.textContent = '$' + state.total.toFixed(2);
  workTotalEl.textContent = '$' + state.workTotal.toFixed(2);
  lastJobEl.textContent = state.lastJob || '—';
  minMsg.style.display = state.workTotal >= MIN_WORK ? 'block' : 'none';
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) {}
}

document.getElementById('addBtn').addEventListener('click', () => {
  const amt = parseFloat(input.value);
  if (isNaN(amt) || amt <= 0) return;
  const earned = amt * RATE;
  state.total += earned;
  state.workTotal += amt;
  state.lastJob = '$' + amt.toFixed(2) + ' job → $' + earned.toFixed(2) + ' commission';
  render();
  save();
  input.value = '';
  input.blur();
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state = { total: 0, workTotal: 0, lastJob: null };
  render();
  save();
});

load();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
